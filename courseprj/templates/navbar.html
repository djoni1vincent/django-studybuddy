<a href="/">
    <h1>LOGO</h1>
</a>
<form action='{% url "home" %}' method="get">
    <input type="text" name="q" placeholder="Search Rooms..." />
</form>
{% if request.user.is_authenticated %}
    <p>Hello, <b>{{ user }}!</b></p>
    <a href="{% url 'logout' %}">Logout</a>
{% else %}
    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'register' %}">Register</a>
{% endif %}
<hr />
